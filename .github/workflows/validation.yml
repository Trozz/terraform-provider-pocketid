name: Validation

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      markdown: ${{ steps.filter.outputs.markdown }}
      yaml: ${{ steps.filter.outputs.yaml }}
      json: ${{ steps.filter.outputs.json }}
      scripts: ${{ steps.filter.outputs.scripts }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Check for file changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            markdown:
              - '**/*.md'
              - '.markdownlint.yaml'
              - '.markdownlint-cli2.yaml'
            yaml:
              - '**/*.yml'
              - '**/*.yaml'
            json:
              - '**/*.json'
              - '**/*.jsonc'
            scripts:
              - 'scripts/**'
            terraform:
              - '**/*.tf'
              - '**/*.tfvars'
              - 'examples/**/*.hcl'

  file-validation:
    runs-on: ubuntu-latest
    name: File Validation
    needs: changes
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Check trailing whitespace
        run: ./scripts/validation/check-trailing-whitespace.sh

      - name: Check end-of-file newlines
        run: ./scripts/validation/check-newlines.sh

      - name: Check merge conflicts
        run: ./scripts/validation/check-merge-conflicts.sh

      - name: Validate YAML files
        if: needs.changes.outputs.yaml == 'true'
        run: ./scripts/validation/validate-yaml.sh

      - name: Validate JSON files
        if: needs.changes.outputs.json == 'true'
        run: ./scripts/validation/validate-json.sh

      - name: Check case conflicts
        run: ./scripts/validation/check-case-conflicts.sh

      - name: Check script permissions
        if: needs.changes.outputs.scripts == 'true'
        run: ./scripts/validation/check-script-permissions.sh

      - name: Check line endings
        run: ./scripts/validation/check-line-endings.sh

  markdown-lint:
    runs-on: ubuntu-latest
    name: Markdown Lint
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v19
        with:
          fix: false
          globs: '**/*.md'

  terraform-fmt:
    runs-on: ubuntu-latest
    name: Terraform Format
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Comment PR on failure
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v7
        if: github.event_name == 'pull_request' && steps.fmt.outcome == 'failure'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `
            #### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`

            \`\`\`
            terraform fmt -check -recursive
            \`\`\`

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Format Status
        if: steps.fmt.outcome == 'failure'
        run: exit 1
